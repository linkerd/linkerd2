permissions:
  contents: read

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      target:
        type: string
        required: false
        default: 'multi-arch'
    outputs:
      artifact-id:
        value: ${{ jobs.build.outputs.artifact-id }}

jobs:
  build:
    runs-on: ${{ vars.LINKERD2_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        id: build
        with:
          build-args: |
            LINKERD_VERSION=${{ inputs.version }}
          target: ${{ inputs.target }}
          context: .
          file: cli/Dockerfile
          cache-from: type=gha,scope=${{ github.ref_name }}-cli
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-cli
          push: false
          load: false
          outputs: type=local,dest=.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        id: upload
        with:
          name: cli-bin-${{ inputs.version }}-${{ inputs.target }}
          path: linkerd2-cli-${{ inputs.version }}-*
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
