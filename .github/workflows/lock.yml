name: "Lock Threads"

on:
  schedule:
    - cron: "0 1 * * *"

permissions:
  issues: write

jobs:
  action:
    runs-on: ${{ vars.LINKERD2_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3
        with:
          issue-inactive-days: "30"
          process-only: "issues"
