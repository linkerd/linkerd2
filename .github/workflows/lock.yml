name: "Lock Threads"

on:
  schedule:
    - cron: "0 1 * * *"

permissions:
  issues: write

jobs:
  action:
    runs-on: ${{ vars.LINKERD2_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c
        with:
          issue-inactive-days: "30"
          process-only: "issues"
